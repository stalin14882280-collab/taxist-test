<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Таксист – Завод-Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #1a1a0e 0%, #2a2418 100%);
            color: #f5e6c4;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Верхняя панель с балансом и выводом */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 80px;
            padding: 8px 16px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 217, 102, 0.3);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .balance-box {
            background: #3d3522;
            border-radius: 40px;
            padding: 6px 18px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 1px;
        }

        .balance-box::before {
            content: "💰";
            font-size: 1.2rem;
        }

        .withdraw-btn {
            background: #e6b422;
            border: none;
            color: #1e1a0c;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 6px 14px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .withdraw-btn:active {
            transform: scale(0.95);
            background: #c99f1a;
        }

        .withdraw-buttons {
            display: flex;
            gap: 10px;
        }

        /* Карточка кликера */
        .clicker-card {
            background: rgba(42, 36, 24, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 217, 102, 0.4);
        }

        .click-area {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .click-circle {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle at 35% 35%, #f3bc5c, #c47d2e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,200,0.6);
            border: 3px solid #ffd966;
        }

        .click-circle:active {
            transform: scale(0.94);
        }

        .factory-icon {
            font-size: 100px;
            filter: drop-shadow(4px 8px 12px black);
            transition: 0.05s;
        }

        .click-circle:active .factory-icon {
            transform: scale(0.95);
        }

        .click-info {
            font-size: 1.2rem;
            background: #2a2418;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 24px;
            border-radius: 40px;
            margin-top: 10px;
            border: 1px solid #ffd966;
        }

        .click-info span {
            font-weight: bold;
            color: #ffd966;
            font-size: 1.6rem;
        }

        /* Анимация всплывающей суммы */
        .floating-number {
            position: fixed;
            pointer-events: none;
            font-weight: bold;
            font-size: 2rem;
            color: #ffd966;
            text-shadow: 0 0 8px #b87c1a;
            z-index: 1000;
            animation: floatUp 0.6s ease-out forwards;
        }

        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0px) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(1.3);
            }
        }

        /* Секция улучшений */
        .upgrade-section {
            background: rgba(42, 36, 24, 0.8);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 20px;
            border: 1px solid rgba(255, 217, 102, 0.4);
        }

        .section-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: #ffd966;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 5px solid #ffd966;
            padding-left: 15px;
        }

        .upgrade-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }

        .upgrade-card {
            background: #3d3522;
            border-radius: 32px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #5e4f32;
            position: relative;
            overflow: hidden;
        }

        .upgrade-card::after {
            content: "🔧";
            position: absolute;
            bottom: -10px;
            right: -10px;
            font-size: 30px;
            opacity: 0.2;
            pointer-events: none;
        }

        .upgrade-card:active {
            transform: scale(0.96);
            background: #4f422a;
        }

        .upgrade-name {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 6px;
        }

        .upgrade-price {
            font-size: 0.8rem;
            color: #ffd966;
            margin-top: 6px;
        }

        .upgrade-reward {
            font-size: 0.75rem;
            background: #2a2418;
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            margin-top: 6px;
        }

        .disabled-upgrade {
            opacity: 0.5;
            filter: grayscale(0.3);
            cursor: not-allowed;
        }

        .disabled-upgrade:active {
            transform: none;
        }

        .current-level {
            text-align: center;
            margin-top: 15px;
            font-size: 0.85rem;
            background: #2a2418;
            border-radius: 40px;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        /* Индикатор прогресса уровня */
        .level-progress {
            width: 100%;
            height: 6px;
            background: #4f422a;
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .level-progress-fill {
            width: 0%;
            height: 100%;
            background: #ffd966;
            border-radius: 3px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="top-bar">
        <div class="balance-box"><span id="balance">0</span> $</div>
        <div class="withdraw-buttons">
            <button class="withdraw-btn" id="withdraw15Btn">⭐ 15</button>
            <button class="withdraw-btn" id="withdraw25Btn">⭐ 25</button>
        </div>
    </div>

    <div class="clicker-card">
        <div class="click-area">
            <div class="click-circle" id="clickCircle">
                <div class="factory-icon">🏭</div>
            </div>
        </div>
        <div class="click-info">
            ⚙️ Доход за клик: <span id="clickIncome">1</span> $
        </div>
    </div>

    <div class="upgrade-section">
        <div class="section-title">
            📈 Модернизация завода
        </div>
        <div class="upgrade-grid" id="upgradesContainer"></div>
        <div class="current-level" id="currentLevelInfo"></div>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.enableClosingConfirmation();

    // Данные улучшений (доход за клик и цена)
    const upgrades = [
        { income: 2, price: 15000 },
        { income: 4, price: 30000 },
        { income: 6, price: 60000 },
        { income: 10, price: 100000 },
        { income: 15, price: 300000 },
        { income: 20, price: 500000 },
        { income: 50, price: 1000000 },
        { income: 100, price: 2000000 }
    ];

    let currentIncome = 1;
    let currentLevel = 0;
    let currentBalance = 0;

    // Функция отправки команды боту
    function sendCommand(cmd) {
        try {
            tg.sendData(cmd);
        } catch(e) {
            console.warn("sendData error", e);
        }
    }

    // Анимация всплывающей суммы
    function showFloatingNumber(amount, x, y) {
        const div = document.createElement('div');
        div.className = 'floating-number';
        div.innerText = `+${amount}$`;
        div.style.left = `${x}px`;
        div.style.top = `${y}px`;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 600);
    }

    // Обработчик клика по заводу
    function tap(event) {
        const rect = event.target.closest('.click-circle').getBoundingClientRect();
        const x = rect.left + rect.width / 2 - 30;
        const y = rect.top - 20;
        showFloatingNumber(currentIncome, x, y);
        
        sendCommand('/tap');
        // Оптимистичное обновление баланса
        currentBalance += currentIncome;
        updateBalanceDisplay();
        saveLocalData();
    }

    function updateBalanceDisplay() {
        document.getElementById('balance').innerText = currentBalance.toLocaleString();
    }

    // Улучшение завода
    function upgradeFactory(income, price, index) {
        if (currentBalance < price) {
            tg.showAlert(`❌ Недостаточно средств! Нужно ${price.toLocaleString()}$`);
            return;
        }
        sendCommand('/upgrade');
        currentIncome = income;
        currentLevel = index + 1;
        currentBalance -= price;
        updateBalanceDisplay();
        renderUpgrades();
        saveLocalData();
        tg.showAlert(`✅ Уровень ${currentLevel} достигнут! Доход за клик: ${currentIncome}$`);
    }

    // Отрисовка списка улучшений
    function renderUpgrades() {
        const container = document.getElementById('upgradesContainer');
        container.innerHTML = '';
        for (let i = 0; i < upgrades.length; i++) {
            const up = upgrades[i];
            const isPurchased = currentLevel > i;
            const isAvailable = currentLevel === i;
            const card = document.createElement('div');
            card.className = 'upgrade-card' + (isPurchased ? ' disabled-upgrade' : '');
            if (isAvailable) {
                card.onclick = () => upgradeFactory(up.income, up.price, i);
            }
            card.innerHTML = `
                <div class="upgrade-name">⚙️ Уровень ${i+1}</div>
                <div class="upgrade-price">💰 ${up.price.toLocaleString()} $</div>
                <div class="upgrade-reward">💵 +${up.income}$ за клик</div>
            `;
            container.appendChild(card);
        }
        document.getElementById('clickIncome').innerText = currentIncome;
        document.getElementById('currentLevelInfo').innerHTML = `
            🏭 Уровень завода: ${currentLevel} / ${upgrades.length} &nbsp;|&nbsp; 
            💰 Доход: ${currentIncome}$ за клик
        `;
    }

    // Сохранение локально
    function saveLocalData() {
        localStorage.setItem('factory_level', currentLevel);
        localStorage.setItem('balance', currentBalance);
    }

    // Загрузка локальных данных при старте
    function loadLocalData() {
        try {
            const savedLevel = localStorage.getItem('factory_level');
            const savedBalance = localStorage.getItem('balance');
            if (savedLevel !== null) {
                currentLevel = parseInt(savedLevel);
                const incomes = [1,2,4,6,10,15,20,50,100];
                currentIncome = incomes[currentLevel] || 1;
                renderUpgrades();
            }
            if (savedBalance !== null) {
                currentBalance = parseInt(savedBalance);
                updateBalanceDisplay();
            }
        } catch(e) {}
    }

    // Инициализация: запрос актуальных данных у бота и загрузка локальных
    function init() {
        loadLocalData();
        sendCommand('/balance');
        sendCommand('/get_factory_level');
        setTimeout(() => {
            tg.showAlert('💰 Баланс и уровень завода можно проверить в чате бота. Начинайте кликать!');
        }, 500);
        // Автосинхронизация каждые 30 секунд
        setInterval(() => {
            sendCommand('/balance');
            sendCommand('/get_factory_level');
        }, 30000);
    }

    // Обработчики кнопок
    document.getElementById('clickCircle').addEventListener('click', tap);
    document.getElementById('withdraw15Btn').addEventListener('click', () => sendCommand('/withdraw 15'));
    document.getElementById('withdraw25Btn').addEventListener('click', () => sendCommand('/withdraw 25'));

    init();
    renderUpgrades();
</script>
</body>
</html>
